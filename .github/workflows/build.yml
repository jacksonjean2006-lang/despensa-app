name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Instalar dependências
        run: flutter pub get

      - name: Criar projeto Android se não existir
        run: |
          if [ ! -d "android" ]; then
            echo "Pasta android não encontrada. Criando..."
            cp -r lib lib_backup
            cp pubspec.yaml pubspec_backup.yaml
            flutter create --platforms=android --org com.infosolutions .
            rm -rf lib
            mv lib_backup lib
            cp pubspec_backup.yaml pubspec.yaml
            flutter pub get
          else
            echo "Pasta android já existe."
          fi

      - name: Build APK release
        run: flutter build apk --release

      - name: Upload APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: despensa-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Copiar APK para raiz e fazer commit
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk app-release.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add app-release.apk android
          git diff --staged --quiet || git commit -m "ci: atualiza APK [skip ci]"
          git push
